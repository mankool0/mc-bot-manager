name: Tag Version

on:
  push:
    branches:
      - master

jobs:
  tag-version:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.PAT }}

      - name: Create version tag
        run: |
          VERSION=$(grep -oP 'project\(mc-bot-manager VERSION \K[0-9]+\.[0-9]+\.[0-9]+' manager/CMakeLists.txt)
          if [ -z "$VERSION" ]; then
            echo "Could not read version from CMakeLists.txt"
            exit 1
          fi
          TAG="v$VERSION"
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists, skipping"
            exit 0
          fi
          echo "Tagging HEAD as $TAG"
          git tag "$TAG"
          git push origin "$TAG"
