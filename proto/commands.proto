syntax = "proto3";

package mankool.mcbot.protocol;

import "common.proto";

// Command messages (Manager -> Client)
// Each command is a separate message type for clarity

enum SocksVersion {
  SOCKS_VERSION_5 = 0;  // default
  SOCKS_VERSION_4 = 1;
}

// Proxy configuration (used in SetProxyConfigCommand)
message ProxyConfig {
  bool enabled = 1;
  string host = 2;
  int32 port = 3;
  string username = 4;       // optional auth
  string password = 5;       // optional auth
  SocksVersion socks_version = 6;
}

// Tell client to configure its proxy (sent by manager on bot connect)
message SetProxyConfigCommand {
  ProxyConfig config = 1;
}

// Tell client to connect to a server
message ConnectToServerCommand {
  string server_address = 1;    // IP:port to connect to
}

// Tell client to disconnect from current server
message DisconnectCommand {
  string reason = 1;            // Optional disconnect reason
}

// Send a chat message or command
message SendChatCommand {
  string message = 1;           // Chat message or command (e.g., "/help")
}

// Movement commands
message MoveToCommand {
  Vec3d target_position = 1;
}

message LookAtCommand {
  oneof target {
    Vec3d position = 1;
    int32 entity_id = 2;
  }
}

message SetRotationCommand {
  float yaw = 1;
  float pitch = 2;
}

// Item/hotbar commands
message SwitchHotbarSlotCommand {
  int32 slot = 1;              // Target slot (0-8)
}

message UseItemCommand {
  Hand hand = 1;               // Which hand to use
}

message DropItemCommand {
  bool drop_all = 1;           // Drop entire stack vs single item
}

// Container interaction commands
message ClickContainerSlotCommand {
  int32 slot_index = 1;
  int32 button = 2;
  ClickType click_type = 3;

  enum ClickType {
    PICKUP = 0;
    QUICK_MOVE = 1;
    SWAP = 2;
    CLONE = 3;
    THROW = 4;
    QUICK_CRAFT = 5;
    PICKUP_ALL = 6;
  }
}

message CloseContainerCommand {
}

message OpenInventoryCommand {
}

// Click a widget (button etc.) by index; fails if screen_id doesn't match
message ClickScreenWidgetCommand {
  string screen_id = 1;
  int32 widget_index = 2; // GuiWidget.index
  int32 button = 3;       // 0=left, 1=right, 2=middle
}

// Click at pixel coordinates; fails if screen_id doesn't match
message ClickScreenPositionCommand {
  string screen_id = 1;
  double x = 2;
  double y = 3;
  int32 button = 4; // 0=left, 1=right, 2=middle
}

// Type text into the current screen; fails if screen_id doesn't match
message TypeTextCommand {
  string screen_id = 1;
  string text = 2;
}

// Press a key (GLFW key code); fails if screen_id doesn't match
message PressKeyCommand {
  string screen_id = 1;
  int32 key_code = 2;
  int32 modifiers = 3; // 0 for none
}

// Open the game/pause menu (ESC)
message OpenGameMenuCommand {
}

// Tell client to shut down the process
message ShutdownCommand {
  string reason = 1;           // Optional reason for shutdown
}

// Response to any command (Client -> Manager)
message CommandResponse {
  enum Status {
    SUCCESS = 0;
    FAILED = 1;
    IN_PROGRESS = 2;
    CANCELLED = 3;
  }

  string command_id = 1;        // ID of the command being responded to
  Status status = 2;
  string message = 3;           // Error message or status description
}